# Fauna CLI v4 config – https://docs.faunadb.org/fauna/current/build/cli/v4/
# Use: fauna query "..." --profile default
# Or: export FAUNA_PROFILE=default  (then you can omit --profile)

# Cloud: database auth via secret
default:
  database: YOUR_FAUNA_DATABASE
  secret: YOUR_FAUNA_SECRET
  --url: http://localhost:8443
  # Or with account key: account-key: fn..  and  role: admin
